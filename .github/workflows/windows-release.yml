name: windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build windows installer
    runs-on: windows-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install dependencies
        run: npm install

      - name: check sources
        run: npm run check

      - name: build installer
        run: npm run desktop:build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: stage installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets
          Copy-Item "dist\*.exe" release-assets\

      - name: upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: schibbs-mic-windows-installer
          path: release-assets/*.exe
          if-no-files-found: error

      - name: publish github release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = @"
          windows installer for schibb's mic.

          download the exe file, run it, and the desktop app will open https://schibbs-mic.onrender.com.
          "@

          if (gh release view $tag 2>$null) {
            gh release upload $tag "release-assets\*.exe" --clobber
          } else {
            gh release create $tag "release-assets\*.exe" --title "schibb's mic $tag" --notes $notes
          }
