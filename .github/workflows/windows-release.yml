name: windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build windows installer
    runs-on: windows-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install dependencies
        run: npm install

      - name: check sources
        run: npm run check

      - name: build installer
        run: npm run desktop:build:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets
          Copy-Item "dist\*.exe" release-assets\
          Copy-Item "dist\*.blockmap" release-assets\
          Copy-Item "dist\latest.yml" release-assets\
          $installer = Get-ChildItem release-assets -Filter "schibbs-mic-setup-*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "installer exe was not generated"
          }
          Copy-Item $installer.FullName "release-assets\schibbs-mic-setup.exe" -Force

      - name: upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: schibbs-mic-windows-release-assets
          path: release-assets/*
          if-no-files-found: error

      - name: publish github release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = @"
          windows installer for schibb's mic.

          download schibbs-mic-setup.exe for the easiest install. the release also includes updater metadata for the desktop app.
          "@
          $assets = Get-ChildItem release-assets -File | ForEach-Object { $_.FullName }

          if (gh release view $tag 2>$null) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --title "schibb's mic $tag" --notes $notes
          }
